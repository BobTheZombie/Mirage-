# Mirage kernel configuration
# Generated by tools/mirageconfig from config/MirageConfig.toml


# Architecture
CONFIG_MIRAGE_ARCH_X86_64=y

# Boot
CONFIG_MIRAGE_FULL_BOOT=y
CONFIG_MIRAGE_SERIAL_CONSOLE=y
CONFIG_MIRAGE_VERBOSE_BOOT=y
CONFIG_MIRAGE_QEMU_DEBUG=n

# Hardware
CONFIG_MIRAGE_HW_FRAMEBUFFER=y
CONFIG_MIRAGE_HW_PCI=n
CONFIG_MIRAGE_HW_AMD64=n
CONFIG_MIRAGE_HW_RYZEN=n
CONFIG_MIRAGE_HW_AMD_CHIPSET=n
CONFIG_MIRAGE_HW_AMD_IOMMU=n
CONFIG_MIRAGE_HW_NVME=n
CONFIG_MIRAGE_HW_AHCI=n
CONFIG_MIRAGE_HW_XHCI=n

# Kernel Core
CONFIG_MIRAGE_IPC=y
CONFIG_MIRAGE_CAPABILITIES=y
CONFIG_MIRAGE_SUPERVISOR=y
CONFIG_MIRAGE_MTSS=y

# Memory
CONFIG_MIRAGE_MEMORY_PAGING=y
CONFIG_MIRAGE_MEMORY_FRAME_ALLOCATOR=y
CONFIG_MIRAGE_MEMORY_HEAP=y

# Debug
CONFIG_MIRAGE_DEBUG=y
CONFIG_MIRAGE_TRACE_IPC=n
