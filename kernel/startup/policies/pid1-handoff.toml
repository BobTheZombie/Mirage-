id = "pid1-handoff"
name = "PID1 Handoff"
kind = "UserspaceBootstrap"
startup = "pid1_handoff"
required = true
failure = "Fatal"
allow_cooperative_mtss = true
require_preemption = false
after = ["userspace-loader", "supervisor", "mtss-pid0"]
wants = ["mtss-pid0"]
wants_capabilities = ["mtss.preemption"]
requires = ["boot.spider_rs_image", "supervisor.launch_grants", "mtss.pid0", "mtss.scheduler", "userspace.loader"]
provides = ["pid1.handoff"]
