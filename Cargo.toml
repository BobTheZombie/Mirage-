[workspace]
members = [".", "crates/mirage-ahci", "crates/mirage-amdgpu", "crates/mirage-block", "crates/mirage-cap", "crates/mirage-fb", "crates/mirage-gpu", "crates/mirage-ipc", "crates/mirage-nvme", "crates/mirage-storage"]
resolver = "2"

[package]
name = "mirage"
version = "0.1.0"
edition = "2021"
authors = ["Mirage Kernel Authors"]
description = "A conceptual 64-bit microkernel-style operating system core written in Rust"
license = "MIT OR Apache-2.0"

[lib]
name = "mirage"
path = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "mirage-kernel"
path = "src/main.rs"

[[bin]]
name = "qfsprogs"
path = "src/bin/qfsprogs.rs"
required-features = ["qfs-std"]

[features]
default = []
# Enables host/testing QFS adapters backed by the Rust standard library.
qfs-std = []

[dependencies]
# The default kernel build is strictly no_std and does not currently rely on external crates.

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
