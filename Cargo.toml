[workspace]
members = [
    ".",
    "crates/mirage-ahci",
    "crates/mirage-amdgpu",
    "crates/mirage-block",
    "crates/mirage-cap",
    "crates/mirage-fb",
    "crates/mirage-gpu",
    "crates/mirage-hw",
    "crates/mirage-ipc",
    "crates/mirage-nvme",
    "crates/mirage-pci",
    "crates/mirage-storage",
    "crates/mirage-usb",
]
resolver = "2"

[package]
name = "mirage"
version = "0.1.0"
edition = "2021"
authors = ["Mirage Kernel Authors"]
description = "A conceptual 64-bit microkernel-style operating system core written in Rust"
license = "MIT OR Apache-2.0"

[lib]
name = "mirage"
path = "src/lib.rs"
crate-type = ["staticlib", "rlib"]

[[bin]]
name = "mirage-kernel"
path = "src/main.rs"

[[bin]]
name = "qfsprogs"
path = "src/bin/qfsprogs.rs"
required-features = ["qfs-std"]

[features]
default = ["mock"]
mock = []
hw-pci = []
hw-nvme = ["hw-pci"]
hw-ahci = ["hw-pci"]
hw-xhci = ["hw-pci"]
hw-framebuffer = []
full-boot = []
hw-amdgpu = ["hw-pci", "hw-framebuffer"]
# Enables host/testing QFS adapters backed by the Rust standard library.
qfs-std = ["dep:mirage-block", "dep:mirage-storage"]

[dependencies]
# The default kernel build is strictly no_std and does not currently rely on external crates.
mirage-block = { path = "crates/mirage-block", optional = true }
mirage-storage = { path = "crates/mirage-storage", optional = true }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
